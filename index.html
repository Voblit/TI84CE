    <button id="install-btn">Install pwa</button>
<footer><h6>Made with ♡&☆ by yaboy <a href="https://voblit.vercel.app" target="_blank">Voblit</a></h6></footer>
    <div class="calc-wrapper">
      <div id="calculatorDiv"></div>
    </div>
    <div id="main_div"></div>
    

    <script>
    let deferredPrompt;
    const installBtn = document.getElementById('install-btn');

    
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }

    if (window.matchMedia('(display-mode: standalone)').matches || navigator.standalone || localStorage.getItem('pwa-installed') === 'true') {
        installBtn.style.display = 'none';
    }

    window.addEventListener('beforeinstallprompt', (e) => {
        
        e.preventDefault();
 
        deferredPrompt = e;
        
        if (!window.matchMedia('(display-mode: standalone)').matches && !navigator.standalone && localStorage.getItem('pwa-installed') !== 'true') {
            installBtn.style.display = 'block';
        }
    });

    
    installBtn.addEventListener('click', async () => {
        if (!deferredPrompt) return;
        

        deferredPrompt.prompt();
        

        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
            console.log('User accepted the install prompt');
            localStorage.setItem('pwa-installed', 'true');
        }
        

        deferredPrompt = null;
        installBtn.style.display = 'none';
    });

    
    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        installBtn.style.display = 'none';
        localStorage.setItem('pwa-installed', 'true');
    });
    </script>

    <script>
      const from_id = (id) => document.getElementById(id);
      const h84statej = from_id("h84statej");
      const ti84faceplate = from_id("ti84faceplate");
      const calc_div = from_id("calculatorDiv");
      const main_div = from_id("main_div");

      XMLHttpRequest.prototype.open = new Proxy(XMLHttpRequest.prototype.open, {
        apply: function (target, thisArg, args) {
          if (typeof args[1] === "string") {
            args[1] = args[1].replace(/#.*$/, "");
          }
          Reflect.apply(target, thisArg, args);
        },
      })

      function create_blob(string) {
        if (!string) return null;
        try {
          let blob = new Blob([JSON.parse(string)]);
          return URL.createObjectURL(blob);
        } catch(e) {
          return null;
        }
      }

      function main() {
        if (location.hash === "#popup" || location.protocol == "file:"){
          main_div.style.display = "none";
        }

        let default_rom = h84statej.getAttribute("data-url");
        let default_faceplate = ti84faceplate.getAttribute("data-url");

        let rom_url = create_blob(h84statej.innerHTML) || default_rom;
        let faceplate_url = create_blob(ti84faceplate.innerHTML) || default_faceplate;
        
        rom_url += "#.h84statej";
        faceplate_url += "#.svg";
        
        let ti84 = new TI84PCE({
          container: calc_div,
          ROMLocation: rom_url, 
          FaceplateLocation: faceplate_url
        });
      }

      main();
    </script>
